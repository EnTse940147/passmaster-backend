<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassMaster - 短網址檔案備份工具</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Noto Sans TC', sans-serif; background: #060606; color: #e0e0e0; min-height: 100vh; }
nav { position: sticky; top: 0; z-index: 100; background: rgba(6,6,6,.95); backdrop-filter: blur(14px); border-bottom: 1px solid #181818; }
.nav-inner { max-width: 1060px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 56px; gap: 10px; flex-wrap: wrap; }
.logo { font-weight: 900; font-size: 18px; cursor: pointer; letter-spacing: -0.5px; white-space: nowrap; }
.nav-links { display: flex; gap: 2px; flex-wrap: wrap; }
.nav-btn { background: none; border: none; color: #666; cursor: pointer; padding: 5px 9px; border-radius: 6px; font-size: 13px; font-weight: 500; }
.nav-btn.active { color: #fff; background: #1a1a1a; }
main { max-width: 1060px; margin: 0 auto; padding: 0 20px; }
.hero { position: relative; padding: 70px 20px 50px; text-align: center; overflow: hidden; }
.hero-bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% -10%, #0d3320 0%, transparent 65%); pointer-events: none; }
.hero-tag { display: inline-block; background: #0a2918; color: #4ade80; border: 1px solid #14532d; border-radius: 20px; padding: 4px 14px; font-size: 13px; font-weight: 600; margin-bottom: 14px; }
.hero-title { font-size: clamp(42px, 9vw, 82px); font-weight: 900; margin: 0 0 14px; letter-spacing: -3px; background: linear-gradient(135deg,#fff 35%,#4ade80); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hero-desc { font-size: 15px; color: #888; line-height: 1.8; margin-bottom: 30px; }
.btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.btn { background: linear-gradient(135deg,#16a34a,#15803d); color: #fff; border: none; border-radius: 10px; padding: 11px 22px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; }
.btn-outline { background: none; border: 1px solid #333; color: #ccc; width: auto; }
.btn-green { background: linear-gradient(135deg,#059669,#047857); }
.btn-small { padding: 9px 18px; font-size: 14px; width: auto; }
section { padding: 50px 0; }
.section-title { font-size: 24px; font-weight: 800; margin-bottom: 22px; letter-spacing: -0.5px; }
.card { background: #0d0d0d; border: 1px solid #1c1c1c; border-radius: 16px; padding: 24px; }
.smart-tag { background: #0a2918; color: #4ade80; border: 1px solid #14532d; border-radius: 20px; padding: 5px 14px; font-size: 13px; font-weight: 700; }
.tabs { display: flex; gap: 8px; flex-wrap: wrap; margin: 16px 0 20px; }
.tab { background: none; border: 1px solid #222; color: #666; cursor: pointer; padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; }
.tab.active { background: #1a1a1a; color: #4ade80; border-color: #4ade80; }
.field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
label { font-size: 13px; color: #666; font-weight: 600; }
input[type=text], input[type=url] { background: #0a0a0a; border: 1px solid #222; border-radius: 10px; padding: 11px 15px; color: #e0e0e0; font-size: 16px; outline: none; width: 100%; }
.pw-wrap { position: relative; }
.pw-input { background: #0a0a0a; border: 1px solid #222; border-radius: 10px; padding: 11px 44px 11px 15px; color: #e0e0e0; font-size: 16px; outline: none; width: 100%; }
.pw-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #666; cursor: pointer; font-size: 16px; padding: 4px; }
.error { background: #1f0a0a; border: 1px solid #7f1d1d; border-radius: 8px; padding: 10px 14px; color: #fca5a5; font-size: 14px; margin-bottom: 14px; }
.success-card { background: #0a0a0a; border: 1px solid #14532d; border-radius: 12px; padding: 18px; margin-top: 16px; }
.success-title { color: #4ade80; font-weight: 700; margin-bottom: 12px; }
.preview-img { width: 100%; max-height: 320px; object-fit: contain; border-radius: 8px; background: #111; display: block; margin-bottom: 10px; }
.result-meta { display: flex; gap: 12px; font-size: 12px; color: #555; margin-bottom: 12px; flex-wrap: wrap; }
.result-meta span { color: #4ade80; }
.dl-group { display: flex; gap: 10px; flex-wrap: wrap; }
.dl-group a { flex: 1; min-width: 120px; text-decoration: none; }
.platform-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
.plat-card { background: #0d0d0d; border: 1px solid; border-radius: 12px; padding: 16px; cursor: pointer; display: flex; flex-direction: column; gap: 6px; }
.plat-dot { width: 10px; height: 10px; border-radius: 50%; }
.plat-name { font-weight: 700; font-size: 15px; }
.plat-domain { color: #555; font-size: 12px; }
.plat-go { font-size: 13px; font-weight: 600; margin-top: 4px; }
.feat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.feat-card { background: #111; border: 1px solid #1a1a1a; border-radius: 12px; padding: 16px; }
.feat-icon { font-size: 26px; margin-bottom: 8px; }
.feat-title { font-weight: 700; margin-bottom: 4px; }
.feat-desc { color: #555; font-size: 13px; }
.faq-item { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 10px; padding: 14px 16px; cursor: pointer; margin-bottom: 8px; }
.faq-q { display: flex; justify-content: space-between; font-weight: 600; font-size: 15px; }
.faq-a { color: #777; font-size: 14px; margin-top: 10px; line-height: 1.7; display: none; }
.faq-a.open { display: block; }
.steps { display: flex; flex-direction: column; gap: 12px; }
.step { display: flex; gap: 14px; align-items: flex-start; background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 12px; padding: 16px; }
.step-n { width: 32px; height: 32px; background: linear-gradient(135deg,#16a34a,#15803d); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; flex-shrink: 0; font-size: 15px; }
.step-title { font-weight: 700; margin-bottom: 4px; }
.step-desc { color: #777; font-size: 14px; }
.page { padding: 36px 0 56px; }
.about-text { color: #888; line-height: 1.8; max-width: 640px; margin-bottom: 14px; }
footer { background: #040404; border-top: 1px solid #111; margin-top: 40px; }
.footer-inner { max-width: 1060px; margin: 0 auto; padding: 40px 20px 24px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 28px; }
.footer-logo { font-weight: 800; font-size: 16px; margin-bottom: 6px; }
.footer-desc { color: #444; font-size: 13px; }
.footer-col-title { font-weight: 700; font-size: 13px; color: #ccc; margin-bottom: 10px; }
.footer-link { background: none; border: none; color: #444; cursor: pointer; font-size: 13px; display: block; padding: 3px 0; text-align: left; }
.footer-bottom { text-align: center; color: #222; font-size: 12px; padding: 14px 20px; border-top: 1px solid #111; }
.disabled-box { background: #0d0d0d; border: 1px solid #1c1c1c; border-radius: 12px; padding: 40px; text-align: center; color: #666; }
.loading { opacity: 0.6; pointer-events: none; }
.badge { display: flex; align-items: center; gap: 8px; border: 1px solid; border-radius: 8px; padding: 8px 14px; margin-bottom: 14px; }
.hidden { display: none; }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="logo" onclick="showPage('home')">🔐 PassMaster</div>
    <div class="nav-links" id="nav-links">
      <button class="nav-btn active" onclick="showPage('home')">首頁</button>
      <button class="nav-btn" onclick="showPage('risu')">Risu</button>
      <button class="nav-btn" onclick="showPage('myppt')">MyPPT</button>
      <button class="nav-btn" onclick="showPage('lurl')">Lurl</button>
      <button class="nav-btn" onclick="showPage('imgus')">Imgus</button>
      <button class="nav-btn" onclick="showPage('ppt')">PPt.cc</button>
      <button class="nav-btn" onclick="showPage('help')">使用教學</button>
      <button class="nav-btn" onclick="showPage('about')">關於我們</button>
    </div>
  </div>
</nav>

<main id="main-content"></main>

<footer>
  <div class="footer-inner">
    <div>
      <div class="footer-logo">🔐 PassMaster</div>
      <div class="footer-desc">短網址檔案備份工具</div>
    </div>
    <div style="display:flex;gap:40px;flex-wrap:wrap;">
      <div>
        <div class="footer-col-title">服務</div>
        <button class="footer-link" onclick="showPage('risu')">Risu</button>
        <button class="footer-link" onclick="showPage('myppt')">MyPPT</button>
        <button class="footer-link" onclick="showPage('lurl')">Lurl</button>
        <button class="footer-link" onclick="showPage('imgus')">Imgus</button>
        <button class="footer-link" onclick="showPage('ppt')">PPt.cc</button>
      </div>
      <div>
        <div class="footer-col-title">快速連結</div>
        <button class="footer-link" onclick="showPage('home')">首頁</button>
        <button class="footer-link" onclick="showPage('help')">使用教學</button>
        <button class="footer-link" onclick="showPage('about')">關於我們</button>
      </div>
    </div>
  </div>
  <div class="footer-bottom">© PassMaster. All rights reserved.</div>
</footer>

<script>
const API_URL = "https://passmaster-backend.onrender.com";

const PLATFORMS = [
  { id:"risu",  name:"Risu",   color:"#ff6b6b", domain:"risu.io" },
  { id:"myppt", name:"MyPPT",  color:"#4ecdc4", domain:"myppt.cc" },
  { id:"lurl",  name:"Lurl",   color:"#45b7d1", domain:"lurl.cc" },
  { id:"imgus", name:"Imgus",  color:"#96ceb4", domain:"imgus.net" },
  { id:"ppt",   name:"PPt.cc", color:"#ffd93d", domain:"ppt.cc" },
  { id:"mork",  name:"Mork",   color:"#c084fc", domain:"mork.cc", disabled:true },
];

let currentUrl = "", currentPw = "", currentTab = "smart";

async function doFetch() {
  const urlInput = document.getElementById("url-input");
  const pwInput  = document.getElementById("pw-input");
  const errBox   = document.getElementById("error-box");
  const resultBox= document.getElementById("result-box");
  const fetchBtn = document.getElementById("fetch-btn");

  currentUrl = urlInput ? urlInput.value.trim() : "";
  currentPw  = pwInput  ? pwInput.value.trim()  : "";

  if (!currentUrl) { showError("請輸入短網址連結"); return; }

  errBox.classList.add("hidden");
  resultBox.innerHTML = "";
  fetchBtn.textContent = "🔄 查詢中...";
  fetchBtn.classList.add("loading");

  try {
    const res = await fetch(`${API_URL}/api/fetch`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url: currentUrl, password: currentPw }),
    });
    const data = await res.json();
    fetchBtn.textContent = "🔍 開始備份查詢";
    fetchBtn.classList.remove("loading");

    if (!res.ok || !data.success) {
      showError(data.detail || data.error || "查無內容，連結可能已過期或密碼錯誤");
      return;
    }
    showResult(data);
  } catch(e) {
    fetchBtn.textContent = "🔍 開始備份查詢";
    fetchBtn.classList.remove("loading");
    showError("連線失敗：" + e.message);
  }
}

function showError(msg) {
  const errBox = document.getElementById("error-box");
  if (errBox) { errBox.textContent = "⚠️ " + msg; errBox.classList.remove("hidden"); }
}

function showResult(data) {
  const box = document.getElementById("result-box");
  if (!box) return;
  const proxyUrl = `https://images.weserv.nl/?url=${encodeURIComponent(data.file_url)}`;
  let mediaHtml = "";
  if (data.type === "image") {
    mediaHtml = `<img class="preview-img" src="${data.file_url}" onerror="this.src='${proxyUrl}'" alt="preview">`;
  } else if (data.type === "video") {
    mediaHtml = `<video class="preview-img" src="${data.file_url}" controls></video>`;
  } else if (data.type === "audio") {
    mediaHtml = `<audio src="${data.file_url}" controls style="width:100%;margin-bottom:10px"></audio>`;
  }
  box.innerHTML = `
    <div class="success-card">
      <div class="success-title">✅ 備份成功</div>
      ${mediaHtml}
      <div class="result-meta">
        <span>📄 ${data.filename}</span>
        <span>🏷 ${data.platform}</span>
      </div>
      <div class="dl-group">
        <a href="${data.file_url}" download="${data.filename}" target="_blank">
          <button class="btn btn-green">⬇ 下載檔案</button>
        </a>
        <a href="${data.file_url}" target="_blank" style="flex:1;min-width:120px">
          <button class="btn btn-outline btn-small" style="width:100%">🔗 開啟連結</button>
        </a>
      </div>
    </div>`;
}

function togglePw() {
  const inp = document.getElementById("pw-input");
  const btn = document.getElementById("pw-toggle");
  if (!inp) return;
  inp.type = inp.type === "password" ? "text" : "password";
  btn.textContent = inp.type === "password" ? "👁" : "🙈";
}

function renderTool(platformId) {
  const p = PLATFORMS.find(x => x.id === platformId);
  if (p && p.disabled) return `<div class="disabled-box"><div style="font-size:36px">🚧</div><div style="margin-top:8px">此平台目前暫無服務</div></div>`;
  const badge = p ? `<div class="badge" style="border-color:${p.color}66;background:${p.color}11">
    <span style="color:${p.color};font-weight:700">${p.name}</span>
    <span style="color:#666;font-size:13px">· ${p.domain}</span>
  </div>` : "";
  const placeholder = p ? `輸入 ${p.name} 短網址...` : "貼上任意短網址，自動辨識平台...";
  return `
    ${badge}
    <div class="field">
      <label>短網址連結</label>
      <input type="url" id="url-input" placeholder="${placeholder}" autocomplete="off" autocorrect="off" autocapitalize="off" onkeydown="if(event.key==='Enter')doFetch()">
    </div>
    <div class="field">
      <label>密碼（選填）</label>
      <div class="pw-wrap">
        <input type="password" id="pw-input" class="pw-input" placeholder="如連結有密碼保護，請輸入密碼" autocomplete="off" autocorrect="off" autocapitalize="off">
        <button class="pw-toggle" id="pw-toggle" onclick="togglePw()" type="button">👁</button>
      </div>
    </div>
    <div id="error-box" class="error hidden"></div>
    <button class="btn" id="fetch-btn" onclick="doFetch()">🔍 開始備份查詢</button>
    <div id="result-box"></div>`;
}

function renderTabs() {
  const tabIds = ["smart", ...PLATFORMS.filter(p=>!p.disabled).map(p=>p.id)];
  return tabIds.map(id => {
    const p = PLATFORMS.find(x=>x.id===id);
    const active = currentTab === id ? "active" : "";
    const color = active && p ? `style="color:${p.color};border-color:${p.color}"` : "";
    return `<button class="tab ${active}" ${color} onclick="setTab('${id}')">${id==='smart'?'⚡ Smart':p?.name}</button>`;
  }).join("");
}

function setTab(id) {
  currentTab = id;
  document.getElementById("tabs").innerHTML = renderTabs();
  document.getElementById("tool-area").innerHTML = renderTool(id === "smart" ? null : id);
}

function showPage(page) {
  // update nav
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  const navBtns = document.querySelectorAll(".nav-btn");
  const pageMap = ["home","risu","myppt","lurl","imgus","ppt","help","about"];
  const idx = pageMap.indexOf(page);
  if (idx >= 0 && navBtns[idx]) navBtns[idx].classList.add("active");

  const main = document.getElementById("main-content");

  if (page === "help") {
    main.innerHTML = `<div class="page">
      <h2 class="section-title">使用教學</h2>
      <div class="steps">
        ${[["1","貼上連結","將短網址貼入輸入欄位，系統會自動辨識平台類型。"],
           ["2","輸入密碼","如果連結有密碼保護，請在密碼欄位填入對應的密碼。"],
           ["3","開始備份","點擊「開始備份查詢」按鈕，後端將自動抓取頁面。"],
           ["4","下載備份","查詢完成後即可預覽並下載檔案，輕鬆完成備份。"]
          ].map(([n,t,d])=>`<div class="step"><div class="step-n">${n}</div><div><div class="step-title">${t}</div><div class="step-desc">${d}</div></div></div>`).join("")}
      </div>
    </div>`;
    return;
  }

  if (page === "about") {
    main.innerHTML = `<div class="page">
      <h2 class="section-title">關於我們</h2>
      <p class="about-text">PassMaster 是一款專為短網址檔案備份設計的線上工具，支援 Risu、MyPPT、Lurl、Imgus、PPt.cc 等主流平台，讓您輕鬆備份圖片、影片與音檔。本工具僅供個人備份使用。</p>
    </div>`;
    return;
  }

  const platPage = PLATFORMS.find(p => p.id === page);
  if (platPage) {
    main.innerHTML = `<div class="page">
      <h2 class="section-title" style="color:${platPage.color}">${platPage.name} 備份</h2>
      <div class="card">${renderTool(platPage.id)}</div>
    </div>`;
    return;
  }

  // Home
  main.innerHTML = `
    <div class="hero">
      <div class="hero-bg"></div>
      <div style="position:relative">
        <div class="hero-tag">短網址檔案備份工具</div>
        <h1 class="hero-title">PassMaster</h1>
        <p class="hero-desc">整合 Risu、MyPPT、Lurl、Imgus、PPt.cc<br>在連結過期前安全備份您的圖片、影片與音檔</p>
        <div class="btn-group">
          <button class="btn btn-small" style="width:auto" onclick="document.getElementById('tool-section').scrollIntoView({behavior:'smooth'})">🚀 立即備份</button>
          <button class="btn btn-outline btn-small" onclick="showPage('help')">📖 使用教學</button>
        </div>
      </div>
    </div>

    <section id="tool-section">
      <div class="card">
        <div style="margin-bottom:16px">
          <span class="smart-tag">⚡ Smart 智慧模式</span>
          <p style="color:#555;font-size:14px;margin-top:8px">貼上任意短網址，自動辨識平台並備份</p>
        </div>
        <div class="tabs" id="tabs">${renderTabs()}</div>
        <div id="tool-area">${renderTool(null)}</div>
      </div>
    </section>

    <section>
      <h2 class="section-title">支援平台</h2>
      <div class="platform-grid">
        ${PLATFORMS.map(p=>`
          <div class="plat-card" style="border-color:${p.color}44;opacity:${p.disabled?.5:1};cursor:${p.disabled?'default':'pointer'}" onclick="${p.disabled?'':``showPage('${p.id}')``}">
            <div class="plat-dot" style="background:${p.color}"></div>
            <div class="plat-name">${p.name}</div>
            <div class="plat-domain">${p.domain}</div>
            ${p.disabled?`<span style="font-size:12px;color:#444">暫無服務</span>`:`<span class="plat-go" style="color:${p.color}">前往備份 →</span>`}
          </div>`).join("")}
      </div>
    </section>

    <section style="background:#0a0a0a;padding:50px 20px;margin:0 -20px">
      <div style="max-width:1060px;margin:0 auto">
        <h2 class="section-title">功能特色</h2>
        <div class="feat-grid">
          ${[["🌐","多平台支援","整合五大短網址平台"],
             ["⚡","智慧辨識","自動辨識平台省去選擇"],
             ["📁","多種格式","圖片、影片、音檔全支援"],
             ["🔐","密碼保護","支援受密碼保護的連結"],
             ["🖥","真實後端","伺服器直接抓取，不受瀏覽器限制"],
             ["💸","完全免費","所有功能免費使用"]
            ].map(([i,t,d])=>`<div class="feat-card"><div class="feat-icon">${i}</div><div class="feat-title">${t}</div><div class="feat-desc">${d}</div></div>`).join("")}
        </div>
      </div>
    </section>

    <section>
      <h2 class="section-title">常見問題</h2>
      ${[["PassMaster 是什麼？","PassMaster 是一款線上短網址檔案備份工具，能在連結過期前幫您下載並保存圖片、影片和音檔。"],
         ["為什麼備份失敗？","可能原因：連結已過期、密碼錯誤、連結不存在，或來源平台暫時無法連線，請稍後再試。"],
         ["支援哪些格式？","支援圖片（JPG、PNG、GIF、WebP）、影片（MP4）、音檔（MP3、OGG）等常見格式。"],
         ["Smart 模式是什麼？","自動辨識您貼上的短網址屬於哪個平台，省去手動選擇的步驟。"]
        ].map(([q,a],i)=>`
        <div class="faq-item" onclick="toggleFaq(${i})">
          <div class="faq-q"><span>${q}</span><span id="faq-arrow-${i}">▾</span></div>
          <div class="faq-a" id="faq-a-${i}">${a}</div>
        </div>`).join("")}
    </section>`;
}

function toggleFaq(i) {
  const el = document.getElementById(`faq-a-${i}`);
  const arrow = document.getElementById(`faq-arrow-${i}`);
  el.classList.toggle("open");
  arrow.style.transform = el.classList.contains("open") ? "rotate(180deg)" : "none";
}

showPage("home");
</script>
</body>
</html>
